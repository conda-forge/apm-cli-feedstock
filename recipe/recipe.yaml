context:
  version: "0.10.0"

package:
  name: apm-cli
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/apm-cli/apm_cli-${{ version }}.tar.gz
  sha256: 266cb8028f800e40f332265654d29376359fb2a4f2276b680eeae26398622763
  patches:
    - update-policy.patch

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  python:
    entry_points:
      - apm = apm_cli.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=42
    - wheel
  run:
    - python >=${{ python_min }}
    - click >=8.0.0
    - colorama >=0.4.6
    - pyyaml >=6.0.0
    - requests >=2.28.0
    - python-frontmatter >=1.0.0
    - llm >=0.17.0
    - llm-github-models >=0.1.0
    - if: match(python, "<3.11")
      then: tomli >=1.2.0
    - toml >=0.10.2
    - rich >=13.0.0
    - rich-click >=1.7.0
    - watchdog >=3.0.0
    - gitpython >=3.1.0
    - ruamel.yaml >=0.18.0

tests:
  - python:
      imports:
        - apm_cli
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - apm --help

about:
  homepage: https://github.com/microsoft/apm
  summary: An open-source dependency manager for AI agents
  description: |
    APM (Agent Package Manager) is an open-source, community-driven dependency
    manager for AI agents. Think package.json, requirements.txt, or Cargo.toml
    but for AI agent configuration. Declare your project's agentic dependencies
    once in apm.yml, and every developer who clones your repo gets a fully
    configured agent setup in seconds with transitive dependency resolution.
  license: MIT
  license_file: LICENSE
  documentation: https://microsoft.github.io/apm/
  repository: https://github.com/microsoft/apm

extra:
  recipe-maintainers:
    - melund
